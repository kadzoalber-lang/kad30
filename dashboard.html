<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./src/firebase.js"></script>
</head>
<body>

    <header>
        <h1>Smart Habit Tracker</h1>
        <button id="logoutBtn">Logout</button>
    </header>

    <main>

        <section class="welcome">
            <h2 id="welcomeMessage">Welcome!</h2>
        </section>

        <section class="add-habit">
            <h3>Add New Habit</h3>

            <form id="habitForm">
                <input
                    type="text"
                    id="habitTitle"
                    placeholder="Enter habit"
                    required
                >

                <button type="submit">
                    Add Habit
                </button>
            </form>
        </section>

        <section class="stats">
            <h3>Statistics</h3>

            <p>Total Habits:
                <span id="totalHabits">0</span>
            </p>

            <p>Completed Today:
                <span id="completedHabits">0</span>
            </p>
        </section>

        <section class="habits">
            <h3>My Habits</h3>

            <ul id="habitList">
            </ul>
        </section>

    </main>

</body>
</html>
